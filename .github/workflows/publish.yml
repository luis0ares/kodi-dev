name: Publish

# Publishes kodi-dev to npm when a GitHub Release is published,
# or on manual dispatch (Actions tab → Run workflow). Does NOT run on push.
# Requires an NPM_TOKEN secret (an npm automation token).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write # push the release tag after publishing
  id-token: write # for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22 # pnpm 11.5 needs Node >=22.13 (uses node:sqlite)
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies (CLI + self-contained board)
        run: |
          pnpm install --frozen-lockfile
          # hoisted: a symlink-free board node_modules so the Next standalone
          # bundle survives `npm publish` (which drops symlinks) — see build:board.
          pnpm -C board install --frozen-lockfile --node-linker=hoisted

      # Build FIRST: board-dist/ is a gitignored artifact that the CLI serve tests
      # resolve on disk (package-relative), so it must exist before `pnpm test`.
      - name: Build board + CLI (bundles the board into board-dist/)
        run: pnpm build

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # On a Release, publish the tag's version (strip a leading "v"), so the npm
      # version follows the GitHub Release instead of whatever is in package.json.
      # --allow-same-version makes it a no-op when package.json was already bumped.
      - name: Sync version from release tag
        if: github.event_name == 'release'
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Only reached when `npm publish` above succeeds (a failed step stops the job),
      # so the repo is tagged only for versions that actually made it to npm. Tags the
      # published package.json version as `v<version>`; a no-op when the tag already
      # exists (e.g. the tag a GitHub Release created).
      - name: Tag the repository (after a successful publish)
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "Tag $VERSION already exists — skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$VERSION" -m "Release $VERSION"
            git push origin "refs/tags/$VERSION"
          fi
