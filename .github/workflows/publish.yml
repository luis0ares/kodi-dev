name: Publish

# Publishes kodi-dev to npm when a GitHub Release is published,
# or on manual dispatch (Actions tab → Run workflow). Does NOT run on push.
# Requires an NPM_TOKEN secret (an npm automation token).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # On a Release, publish the tag's version (strip a leading "v"), so the npm
      # version follows the GitHub Release instead of whatever is in package.json.
      # --allow-same-version makes it a no-op when package.json was already bumped.
      - name: Sync version from release tag
        if: github.event_name == 'release'
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
