<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1330 1015" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a8aa0"/>
    </marker>
    <style>
      .bg{fill:#fdfdff;}
      .sub{fill:#f4f3fb;stroke:#c7c3e4;stroke-width:1.5;}
      .subt{fill:#6b63a6;font-size:14px;font-weight:700;}
      .agent{fill:#eceafd;stroke:#8a7fd4;stroke-width:1.5;}
      .mgr{fill:#ddd7f5;stroke:#6f5fce;stroke-width:1.8;}
      .hub{fill:#dcd9f7;stroke:#6f5fce;stroke-width:2;}
      .hubt{fill:#33285d;font-size:15.5px;font-weight:700;text-anchor:middle;}
      .name{fill:#4b3fae;font-weight:600;text-anchor:middle;font-family:ui-monospace,Menlo,Consolas,monospace;}
      .tag{fill:#7a72a8;font-size:11px;text-anchor:middle;}
      .term{fill:#e5e1fb;stroke:#6f5fce;stroke-width:2;}
      .termt{fill:#33285d;font-size:14px;font-weight:700;text-anchor:middle;}
      .dec{fill:#e7e3fb;stroke:#7a6bd0;stroke-width:1.6;}
      .dect{fill:#33285d;font-size:13.5px;font-weight:600;text-anchor:middle;}
      .doct{fill:#6b5a1e;font-size:14.5px;font-weight:700;text-anchor:middle;}
      .edge{stroke:#8a8aa0;stroke-width:1.8;fill:none;}
      .edgeb{stroke:#7a6bd0;stroke-width:2.4;fill:none;}
      .elbl{fill:#50505f;font-size:12.5px;text-anchor:middle;paint-order:stroke;stroke:#fdfdff;stroke-width:3.5px;stroke-linejoin:round;}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1330" height="1015"/>

  <!-- subtree containers -->
  <rect class="sub" x="40" y="360" width="440" height="200" rx="12"/>
  <text class="subt" x="54" y="384">architecture subtree</text>
  <rect class="sub" x="670" y="360" width="600" height="200" rx="12"/>
  <text class="subt" x="684" y="384">ux subtree</text>

  <!-- intake edges -->
  <line class="edge" x1="600" y1="74" x2="600" y2="94" marker-end="url(#arw)"/>
  <line class="edge" x1="600" y1="143" x2="600" y2="167" marker-end="url(#arw)"/>
  <text class="elbl" x="586" y="159" text-anchor="end">PRD → docs/prd</text>
  <line class="edge" x1="600" y1="215" x2="600" y2="238" marker-end="url(#arw)"/>

  <!-- spawn edges -->
  <path class="edgeb" d="M562,296 C 470,330 370,356 335,379" marker-end="url(#arw)"/>
  <text class="elbl" x="432" y="322">spawns · parallel</text>
  <path class="edgeb" d="M642,296 C 760,330 900,356 966,379" marker-end="url(#arw)"/>
  <text class="elbl" x="795" y="322">spawns · parallel</text>

  <!-- manager -> leaf edges -->
  <path class="edge" d="M300,429 C 240,448 180,460 150,471" marker-end="url(#arw)"/>
  <path class="edge" d="M356,429 C 352,448 351,460 350,471" marker-end="url(#arw)"/>
  <path class="edge" d="M915,429 C 830,448 792,460 772,471" marker-end="url(#arw)"/>
  <path class="edge" d="M965,429 C 952,448 948,460 946,471" marker-end="url(#arw)"/>
  <path class="edge" d="M1028,429 C 1108,448 1140,460 1150,471" marker-end="url(#arw)"/>

  <!-- validated -> phases (routed down into the gap, below the subtrees) -->
  <path class="edge" d="M450,412 C 515,448 530,560 572,632" marker-end="url(#arw)"/>
  <text class="elbl" x="505" y="590">validated architecture</text>
  <path class="edge" d="M850,414 C 740,424 670,440 652,468 C 640,520 636,580 633,632" marker-end="url(#arw)"/>
  <text class="elbl" x="712" y="590">validated UX</text>

  <!-- center chain -->
  <line class="edge" x1="600" y1="668" x2="600" y2="706" marker-end="url(#arw)"/>
  <text class="elbl" x="614" y="690" text-anchor="start">MVP-first phases + deps</text>
  <line class="edge" x1="600" y1="756" x2="600" y2="784" marker-end="url(#arw)"/>
  <line class="edge" x1="600" y1="904" x2="600" y2="934" marker-end="url(#arw)"/>
  <text class="elbl" x="614" y="922" text-anchor="start">pass</text>

  <!-- gaps loop -->
  <path class="edge" d="M695,846 C 1180,866 1300,600 1300,440 C 1300,300 950,268 708,268" marker-end="url(#arw)"/>
  <text class="elbl" x="1305" y="480">gaps</text>

  <!-- ============ nodes ============ -->
  <!-- briefing.md doc -->
  <path fill="#fff9ec" stroke="#cbb26a" stroke-width="1.5" d="M510,22 h166 l14,14 v38 h-180 z"/>
  <path fill="none" stroke="#cbb26a" stroke-width="1.5" d="M676,22 v14 h14"/>
  <text class="doct" x="597" y="53">briefing.md</text>
  <!-- detail -->
  <rect class="agent" x="525" y="97" width="150" height="46" rx="10"/>
  <text class="name" x="600" y="125" font-size="15">detail</text>
  <!-- human sign-off -->
  <rect class="term" x="510" y="169" width="180" height="46" rx="23"/>
  <text class="termt" x="600" y="197">human sign-off</text>
  <!-- hub -->
  <polygon class="hub" points="513,240 687,240 705,268 687,296 513,296 495,268"/>
  <text class="hubt" x="600" y="273">main-loop hub</text>

  <!-- architect (manager) -->
  <rect class="mgr" x="210" y="381" width="240" height="48" rx="10"/>
  <text class="name" x="330" y="401" font-size="14.5">architect</text>
  <text class="tag" x="330" y="418">manager</text>
  <!-- ux-lead (manager) -->
  <rect class="mgr" x="850" y="381" width="240" height="48" rx="10"/>
  <text class="name" x="970" y="401" font-size="14.5">ux-lead</text>
  <text class="tag" x="970" y="418">manager</text>

  <!-- arch leaves -->
  <rect class="agent" x="50" y="474" width="180" height="66" rx="10"/>
  <text class="name" x="140" y="504" font-size="13.5">system-architect</text>
  <text class="tag" x="140" y="522">ADR leaf</text>
  <rect class="agent" x="255" y="474" width="190" height="66" rx="10"/>
  <text class="name" x="350" y="504" font-size="13.5">data-engineer</text>
  <text class="tag" x="350" y="522">data-model leaf</text>

  <!-- ux leaves -->
  <rect class="agent" x="680" y="474" width="160" height="66" rx="10"/>
  <text class="name" x="760" y="504" font-size="13.5">researcher</text>
  <text class="tag" x="760" y="522">flows leaf</text>
  <rect class="agent" x="875" y="474" width="140" height="66" rx="10"/>
  <text class="name" x="945" y="504" font-size="13.5">brand</text>
  <text class="tag" x="945" y="522">direction leaf</text>
  <rect class="agent" x="1050" y="474" width="200" height="66" rx="10"/>
  <text class="name" x="1150" y="504" font-size="13">component-engineer</text>
  <text class="tag" x="1150" y="522">design-system leaf</text>

  <!-- center chain nodes -->
  <rect class="agent" x="525" y="616" width="150" height="52" rx="10"/>
  <text class="name" x="600" y="648" font-size="15">phases</text>
  <rect class="agent" x="515" y="708" width="170" height="48" rx="10"/>
  <text class="name" x="600" y="737" font-size="15">qa-planning</text>
  <polygon class="dec" points="600,788 695,846 600,904 505,846"/>
  <text class="dect" x="600" y="842">all requirements</text>
  <text class="dect" x="600" y="859">trace through?</text>
  <!-- docs/plan doc -->
  <path fill="#fff9ec" stroke="#cbb26a" stroke-width="1.5" d="M480,936 h226 l14,14 v42 h-240 z"/>
  <path fill="none" stroke="#cbb26a" stroke-width="1.5" d="M706,936 v14 h14"/>
  <text class="doct" x="597" y="969">docs/plan — phased plan</text>
</svg>
